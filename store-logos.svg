<!-- Inline store brand marks for HezoKorea marquee -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <symbol id="logo-coupang" viewBox="0 0 120 32">
    <rect width="120" height="32" rx="6" fill="#E02020"/>
    <path d="M18 8 L26 16 L18 24 L14 20 L18 16 L14 12 Z" fill="#fff"/>
    <text x="32" y="21" font-family="Arial Black,sans-serif" font-weight="900" font-size="14" fill="#fff">coupang</text>
  </symbol>
  <symbol id="logo-naver" viewBox="0 0 100 32">
    <rect width="100" height="32" rx="6" fill="#03C75A"/>
    <text x="12" y="22" font-family="Arial Black,sans-serif" font-weight="900" font-size="18" fill="#fff">N</text>
    <text x="34" y="21" font-family="Arial,sans-serif" font-weight="700" font-size="13" fill="#fff">Store</text>
  </symbol>
  <symbol id="logo-bunjang" viewBox="0 0 110 32">
    <rect width="110" height="32" rx="6" fill="#FF4D4D"/>
    <text x="10" y="21" font-family="Arial Black,sans-serif" font-weight="900" font-size="13" fill="#fff">Bunjang</text>
  </symbol>
  <symbol id="logo-danggeun" viewBox="0 0 130 32">
    <rect width="130" height="32" rx="6" fill="#FF6F0F"/>
    <path d="M14 22 C14 14 18 10 22 10 C24 10 25 11 25 13 C25 11 26 10 28 10 C32 10 36 14 36 22" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M22 10 L20 6 M28 10 L30 6" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <text x="44" y="21" font-family="Arial,sans-serif" font-weight="700" font-size="12" fill="#fff">Danggeun</text>
  </symbol>
  <symbol id="logo-gmarket" viewBox="0 0 110 32">
    <rect width="110" height="32" rx="6" fill="#00C73C"/>
    <path d="M12 20 Q22 8 32 20" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>
    <text x="38" y="21" font-family="Arial Black,sans-serif" font-weight="900" font-size="13" fill="#fff">Gmarket</text>
  </symbol>
  <symbol id="logo-11st" viewBox="0 0 90 32">
    <rect width="90" height="32" rx="6" fill="#FF0036"/>
    <text x="10" y="22" font-family="Arial Black,sans-serif" font-weight="900" font-size="16" fill="#fff">11</text>
    <text x="38" y="21" font-family="Arial,sans-serif" font-weight="700" font-size="13" fill="#fff">st</text>
  </symbol>
</svg>
